# config.yaml — Hyperparamètres & Chemins du Projet DAiSEE

# --- Chemins du dataset ---
paths:
  dataset_root: "D:/Facial_Emotion_Detection/DAiSEE"
  train_video_dir: "D:/Facial_Emotion_Detection/DAiSEE/DataSet/Train"
  val_video_dir:   "D:/Facial_Emotion_Detection/DAiSEE/DataSet/Validation"
  test_video_dir:  "D:/Facial_Emotion_Detection/DAiSEE/DataSet/Test"
  train_labels:    "D:/Facial_Emotion_Detection/DAiSEE/Labels/TrainLabels.csv"
  val_labels:      "D:/Facial_Emotion_Detection/DAiSEE/Labels/ValidationLabels.csv"
  test_labels:     "D:/Facial_Emotion_Detection/DAiSEE/Labels/TestLabels.csv"
  output_dir:      "./outputs"
  checkpoint_dir:  "./outputs/checkpoints"
  log_dir:         "./outputs/logs"
  figures_dir:     "./outputs/figures"

# --- Dataset ---
dataset:
  n_frames: 8          # Nombre de frames extraites par clip (réduit pour 4-6GB VRAM)
  image_size: 224       # Taille des frames (224x224)
  face_detection: true  # Activer MTCNN avec fallback sur frame entière

# --- Modèle ---
model:
  backbone: "efficientnet_b2"
  pretrained: true
  hidden_size: 256      # Réduit pour 4-6GB VRAM (512 si plus de VRAM)
  gru_layers: 2
  gru_dropout: 0.3
  n_attention_heads: 8
  n_classes: 4          # Very Low, Low, High, Very High
  dropout_classifier: 0.4

# --- Entraînement ---
training:
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  epochs: 50
  batch_size: 4
  accumulation_steps: 8
  mixed_precision: true      # ← ajouter cette ligne
  early_stopping_patience: 15
  unfreeze_epoch: 5
  use_mixup: true
  label_smoothing: 0.1
  num_workers: 2 

# --- Scheduler ---
scheduler:
  name: "cosine_annealing"
  T_max: 50
  eta_min: 1.0e-6

# --- Labels ---
labels:
  names: ["Boredom", "Engagement", "Confusion", "Frustration"]
  levels: ["Very Low", "Low", "High", "Very High"]

# --- Reproductibilité ---
seed: 42
