# config.yaml — Run 10
# Stratégie : quasi-identique Run 6 + Confusion cap 3.0→3.2 + augmentations couleur

paths:
  dataset_root:    "D:/Facial_Emotion_Detection/DAiSEE"
  train_video_dir: "D:/Facial_Emotion_Detection/DAiSEE/DataSet/Train"
  val_video_dir:   "D:/Facial_Emotion_Detection/DAiSEE/DataSet/Validation"
  test_video_dir:  "D:/Facial_Emotion_Detection/DAiSEE/DataSet/Test"
  train_labels:    "D:/Facial_Emotion_Detection/DAiSEE/Labels/TrainLabels.csv"
  val_labels:      "D:/Facial_Emotion_Detection/DAiSEE/Labels/ValidationLabels.csv"
  test_labels:     "D:/Facial_Emotion_Detection/DAiSEE/Labels/TestLabels.csv"
  all_labels:      "D:/Facial_Emotion_Detection/DAiSEE/Labels/AllLabels.csv"
  output_dir:      "./outputs"
  checkpoint_dir:  "./outputs/checkpoints"
  log_dir:         "./outputs/logs"
  figures_dir:     "./outputs/figures"

dataset:
  n_frames: 16
  image_size: 224
  face_detection: false
  binary: true

model:
  backbone: "efficientnet_b2"
  pretrained: true
  hidden_size: 256
  gru_layers: 2
  gru_dropout: 0.3
  n_attention_heads: 8
  n_classes: 2
  dropout_classifier: 0.4   # restauré Run 6

training:
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4      # restauré Run 6
  epochs: 60
  batch_size: 4
  accumulation_steps: 8
  mixed_precision: true
  early_stopping_patience: 15
  unfreeze_epoch: 10         # restauré Run 6
  use_mixup: false
  label_smoothing: 0.1       # restauré Run 6
  num_workers: 2
  oversample: false
  focal_gamma: 0.5           # restauré Run 6
  sanity_check_epoch: 10
  sanity_check_threshold: 30.0

scheduler:
  name: "cosine_annealing"
  T_max: 60
  eta_min: 1.0e-6

labels:
  names: ["Boredom", "Engagement", "Confusion", "Frustration"]
  levels: ["Low", "High"]

seed: 42