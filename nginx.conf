server {
    listen $PORT;

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /ws/ {
        proxy_pass         https://edusense-backend-728698401230.us-central1.run.app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host edusense-backend-728698401230.us-central1.run.app;
        proxy_read_timeout 86400;
    }

    location /auth/ {
        proxy_pass         https://edusense-backend-728698401230.us-central1.run.app;
        proxy_set_header   Host edusense-backend-728698401230.us-central1.run.app;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location /sessions {
        proxy_pass         https://edusense-backend-728698401230.us-central1.run.app;
        proxy_set_header   Host edusense-backend-728698401230.us-central1.run.app;
        proxy_http_version 1.1;
    }

    location /alerts {
        proxy_pass         https://edusense-backend-728698401230.us-central1.run.app;
        proxy_set_header   Host edusense-backend-728698401230.us-central1.run.app;
        proxy_http_version 1.1;
    }

    location /health {
        proxy_pass         https://edusense-backend-728698401230.us-central1.run.app;
        proxy_set_header   Host edusense-backend-728698401230.us-central1.run.app;
        proxy_http_version 1.1;
    }
}